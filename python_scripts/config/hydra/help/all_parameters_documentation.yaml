template: |
  ======================================================================
  ==                   NumberModel Training Pipeline                  ==
  ======================================================================

  == Configuration Groups ==
  Compose your configuration from these groups (group=option)

  $APP_CONFIG_GROUPS

  == Parameters & Descriptions ==
  architecture : (Any) Model architecture definition. Parsed via Hydra's _target_.

  save_parameters:
    model_path   : (Str) Directory where the model artifacts will be saved.
    model_name   : (Str) Base filename for the saved model (without extension).
    save_model   : (Bool) Whether to save the model after training.
    load_model   : (Str/Null) Path to a .pth file to load for evaluation.
    trace_sample : (Bool) Trace and save layer outputs for a sample.

  torch:
    device                       : (Str) Hardware device to use: 'cpu', 'cuda', or 'mps'.
    backends_cudnn_deterministic : (Bool) Enforce deterministic CuDNN.
    use_deterministic_algorithms : (Bool) Enforce deterministic PyTorch algorithms.

  misc:
    display_loss : (Bool) Plot and display loss/lrate graphs after training.

  ======================================================================
