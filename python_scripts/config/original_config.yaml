defaults:
  - default_config
  - architecture: original_architecture
  - _self_

save_parameters:
  model_path: ./models
  model_name: Original_TestNumberModelForTFLite
  save_model: true
  load_model: null
  trace_sample: true
training:
  dataset_path: ./cell_dataset
  train_test_split: 0.8
  epochs: 150
  lrate: 0.015
  batch_size: 128
  lrate_scheduler:
    enable: true
    type: cosine_annealing
    parameters:
      T_max: 30
torch:
  device: cuda
  backends_cudnn_deterministic: true
  use_deterministic_algorithms: true
misc:
  verbose_architecture: false
  display_loss: true
